name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: gd, zip, intl
          coverage: none

      - name: Validate composer manifests
        run: |
          composer validate --strict
          composer validate --strict packages/platform/composer.json
          composer validate --strict packages/api-platform/composer.json
          composer validate --strict packages/admin-bundle/composer.json

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit
