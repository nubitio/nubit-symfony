name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: gd, zip, intl
          coverage: none

      - name: Validate composer manifests
        run: |
          composer validate --strict
          composer validate --strict packages/platform/composer.json
          composer validate --strict packages/api-platform/composer.json
          composer validate --strict packages/admin-bundle/composer.json

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Mago lint
        run: vendor/bin/mago lint

      - name: Mago format (check)
        run: vendor/bin/mago fmt --dry-run

      - name: Mago analyze
        run: vendor/bin/mago analyze

      - name: PHPUnit
        run: vendor/bin/phpunit
