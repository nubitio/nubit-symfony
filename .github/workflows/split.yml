name: Split packages

# Mirrors each package to its read-only repo (nubitio/platform,
# nubitio/api-platform, nubitio/admin-bundle, nubitio/sequence-bundle,
# nubitio/workflow-bundle, nubitio/tenant-bundle) so Packagist can serve them
# individually. Uses native `git subtree split` instead of the symplify
# action: that action interpolated commit messages unquoted into sh (an
# apostrophe silently skipped the push while the job stayed green) and
# swallowed push failures. Requires the SPLIT_TOKEN secret: a fine-grained
# PAT with content write access to every split repository.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

# Serialize runs: a tag push and its branch push used to race each other
# into the mirrors and one of them lost.
concurrency:
  group: split-packages
  cancel-in-progress: false

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { dir: platform, repo: platform }
          - { dir: api-platform, repo: api-platform }
          - { dir: admin-bundle, repo: admin-bundle }
          - { dir: sequence-bundle, repo: sequence-bundle }
          - { dir: workflow-bundle, repo: workflow-bundle }
          - { dir: tenant-bundle, repo: tenant-bundle }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # subtree split walks the full history
          # checkout persists the workflow token as an extraheader that
          # overrides URL-embedded credentials — the mirror push must
          # authenticate with SPLIT_TOKEN instead.
          persist-credentials: false

      - name: Split and push
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          PACKAGE_DIR: ${{ matrix.package.dir }}
          MIRROR_REPO: ${{ matrix.package.repo }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          sha=$(git subtree split --prefix="packages/$PACKAGE_DIR" HEAD)
          echo "split head: $sha"

          remote="https://x-access-token:${SPLIT_TOKEN}@github.com/nubitio/${MIRROR_REPO}.git"

          # First push from subtree-split rewrites the symplify-era history,
          # hence --force. The mirrors are read-only by convention.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            # Tags must sit on the mirror history: update main first (the
            # branch-push run may not have landed yet), then tag the head.
            git push --force "$remote" "$sha:refs/heads/main"
            git push --force "$remote" "$sha:refs/tags/$tag"
          else
            git push --force "$remote" "$sha:refs/heads/main"
          fi
